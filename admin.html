<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Admin</title>

<style>
body {
    background: black;
    color: #00ff9f;
    font-family: monospace;
    margin: 0;
    font-size: 16px;
}

/* LOGIN */
#login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

input {
    padding: 10px;
    margin: 5px;
    background: black;
    border: 1px solid #00ff9f;
    color: #00ff9f;
}

/* PANEL */
#panel {
    display: none;
    padding: 20px;
}

/* CONTADOR */
#contador {
    text-align: center;
    font-size: 22px;
    margin-bottom: 20px;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 5px #00ff9f; }
    to { text-shadow: 0 0 20px #00ff9f; }
}

/* LISTA */
#lista {
    max-width: 500px;
    margin: auto;
}

/* ITEM */
.item {
    border: 1px solid #00ff9f;
    padding: 10px;
    margin: 10px 0;
    animation: aparecer 0.5s ease;
}

@keyframes aparecer {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

/* NUEVO */
.nuevo {
    animation: glitch 0.3s infinite;
}

@keyframes glitch {
    0% { text-shadow: 2px 2px red; }
    50% { text-shadow: -2px -2px blue; }
    100% { text-shadow: 2px -2px green; }
}

.rank {
    color: yellow;
}

.fecha {
    font-size: 12px;
    opacity: 0.7;
}


/* CONTENEDOR FLEX DEL ITEM */
.item-content{
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* INFO DEL USUARIO */
/* 📱 MOBILE PRO */
@media (max-width: 768px){

  #lista{
    width: 95%;
  }

  .item-content{
    flex-direction: row; /* 🔥 ahora NO baja */
    justify-content: space-between;
    align-items: center;
  }

  .info{
    max-width: 70%; /* 🔥 evita que ocupe todo */
    word-wrap: break-word;
  }

  button{
    width: auto;
    padding: 6px 10px;
    font-size: 14px;
    border: 1px solid red;
    color: red;
  }

  button:hover{
    background: red;
    color: white;
  }
}

/* 💥 ELIMINAR CON GLITCH */
.eliminando{
    animation: borrarGlitch 0.4s forwards;
}

@keyframes borrarGlitch {
    0% {
        opacity: 1;
        transform: translateX(0);
        filter: none;
    }
    20% {
        transform: translateX(-5px);
        text-shadow: 2px 0 red;
    }
    40% {
        transform: translateX(5px);
        text-shadow: -2px 0 blue;
    }
    60% {
        transform: translateX(-3px);
        text-shadow: 2px 0 green;
    }
    80% {
        opacity: 0.5;
    }
    100% {
        opacity: 0;
        transform: translateX(20px);
    }
}


</style>
</head>

<body>

<div id="login">
    <h2>Acceso Admin</h2>
    <input id="user" placeholder="Usuario">
    <input id="pass" type="password" placeholder="Contraseña">
    <button onclick="entrar()">Entrar</button>
</div>

<div id="panel">
    <h1 style="text-align:center;">🖥️ PANEL</h1>
    <div id="contador"></div>
    <div id="lista"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB3wqtUnaFEJmXBSm6LEwdEDBbSqr2i7ms",
    authDomain: "invitacion18-58c79.firebaseapp.com",
    projectId: "invitacion18-58c79",
    storageBucket: "invitacion18-58c79.firebasestorage.app",
    messagingSenderId: "1024364556649",
    appId: "1:1024364556649:web:696e11768b66fb9d838df8"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let prevCount = 0;

/* LOGIN */
function entrar(){
    if(user.value==="admin" && pass.value==="admin.18d"){
        login.style.display="none";
        panel.style.display="block";
        cargar();
    }
}

/* DATOS */
function cargar(){
    db.collection("asistentes")
    .orderBy("fecha","asc")
    .onSnapshot(snapshot=>{

        lista.innerHTML="";
        contador.innerText="CONFIRMADOS: " + snapshot.size;

        let rank=1;

        snapshot.forEach(doc=>{
            let data=doc.data();

            let div=document.createElement("div");
            div.className="item";

            if(snapshot.size > prevCount){
                div.classList.add("nuevo");
            }

            let fecha = data.fecha ? new Date(data.fecha.seconds*1000) : new Date();

            div.innerHTML=`
                <div class="item-content">
                    <div class="info">
                        <span class="rank">#${rank}</span>
                        <strong>${data.nombre}</strong><br>
                        <span class="fecha">${fecha.toLocaleString()}</span>
                    </div>

                   <button onclick="borrar('${doc.id}', this.parentElement.parentElement)">🗑️</button>
            `;

            lista.appendChild(div);
            rank++;
        });

        prevCount = snapshot.size;
    });
}

function borrar(id, elemento){

    if(confirm("¿Eliminar este registro?")){

        // animación primero
        elemento.classList.add("eliminando");

        // borrar después
        setTimeout(()=>{
            db.collection("asistentes").doc(id).delete();
        },400);
    }
}
</script>
</body>
</html>
